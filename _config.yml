# Images
hero_bg: "/assets/img/hero-bg.jpg"
about_image: "/assets/img/hero.jpg"
numbers_bg: "/assets/img/bg2.jpg"
testimonials_bg: "/assets/img/bg3.jpg"
contact_bg: "/assets/img/bg4.jpg"

# Section headings (subtitle + title)
sections:
  about:
    subtitle: "About Me"
    title: ""  # uses site.name by default
  resume:
    subtitle: "Resume"
    title: "Education & Experience"
    education: "Education"
    experience: "Experience"
    skills: "Skills"
  services:
    subtitle: "Services"
    title: "What I Do"
  portfolio:
    subtitle: "Portfolio"
    title: "My Work"
    filter_all: "All"
    client_label: "Client"
    task_label: "Task"
    tech_label: "Tech"
  testimonials:
    subtitle: "Testimonials"
    title: "What People Say"
  blog:
    subtitle: "Blog"
    title: "Latest Articles"
  contact:
    subtitle: "Contact"
    title: "Get In Touch"
    address_label: "Address"
    email_label: "Email"
    phone_label: "Phone"
    name_placeholder: "Your Name"
    email_placeholder: "Your Email"
    subject_placeholder: "Subject"
    message_placeholder: "Your Message"
    submit: "Send Message"

# Button labels
cv_button: "Download CV"

# Footer
footer_text: "All Rights Reserved."
footer_links:
  - title: "Impressum"
    url: "/impressum/"
  - title: "Datenschutz"
    url: "/datenschutz/"

# Display limits
blog_limit: 4

# Build settings
markdown: kramdown
permalink: /blog/:title/
timezone: Europe/Berlin

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

# Collections
collections:
  posts:
    output: true
