about_text_2: "My job is to build your website so that it is functional and user-friendly but at the same time attractive. Moreover, I add personal touch to your product and make sure that is eye-catching and easy to use. My aim is to bring across your message and identity in the most creative way."
email: "alex@example.com"
phone: "+1 234 567 890"
address: "Sydney, Australia"
