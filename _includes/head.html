<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1f16">
  <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="32x32">

  <!-- SEO (title, description, og:, twitter:, canonical) -->
  {% seo %}

  <!-- Feed -->
  {% feed_meta %}

  <!-- hreflang -->
  {% if lang == "de" %}
  <link rel="alternate" hreflang="de" href="{{ site.url }}{{ page.url }}" />
  <link rel="alternate" hreflang="en" href="{{ site.url }}{{ page.alternate_url | default: '/' }}" />
  <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ page.alternate_url | default: '/' }}" />
  {% else %}
  <link rel="alternate" hreflang="en" href="{{ site.url }}{{ page.url }}" />
  <link rel="alternate" hreflang="de" href="{{ site.url }}{{ page.alternate_url | default: '/de/' }}" />
  <link rel="alternate" hreflang="x-default" href="{{ site.url }}{{ page.url }}" />
  {% endif %}

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": {{ site.name | jsonify }},
    "jobTitle": {{ d.about.role | jsonify }},
    "url": {{ site.url | jsonify }},
    "address": {
      "@type": "PostalAddress",
      "addressLocality": {{ site.address | jsonify }}
    },
    "sameAs": [{% assign real_socials = site.data.social | where_exp: "s", "s.url != '#' and s.url != '#email'" %}{% for social in real_socials %}{{ social.url | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}]
  }
  </script>

  <!-- Preconnect to external origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet"></noscript>

  <!-- Preload critical CSS -->
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" as="style">
  <link rel="preload" href="{{ '/assets/css/style.css' | relative_url }}" as="style">

  <!-- Bootstrap 5 CSS (non-blocking) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></noscript>

  <!-- Font Awesome 6 (non-blocking) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"></noscript>

  <!-- Custom CSS (non-blocking, must load after Bootstrap to override) -->
  <link href="{{ '/assets/css/style.css' | relative_url }}" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="{{ '/assets/css/style.css' | relative_url }}" rel="stylesheet"></noscript>
</head>
