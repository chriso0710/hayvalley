<section id="contact" class="section contact-section bg-dark-alt">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center">
        <h6 class="section-subtitle">{{ t.contact.subtitle }}</h6>
        <h2 class="section-title">{{ t.contact.title }}</h2>
      </div>
    </div>
    <div class="row mt-5">
      <div class="col-lg-4 mb-4 mb-lg-0">
        <div class="contact-info">
          <div class="contact-info-item">
            <i class="fas fa-map-marker-alt"></i>
            <div>
              <h6>{{ t.contact.address_label }}</h6>
              <p>{{ site.address }}</p>
            </div>
          </div>
          <div class="contact-info-item">
            <i class="fas fa-envelope"></i>
            <div>
              <h6>{{ t.contact.email_label }}</h6>
              <p><span class="protected-email" data-user="co" data-domain="hayvalley.de"></span></p>
            </div>
          </div>
          {% if site.phone != "" %}
          <div class="contact-info-item">
            <i class="fas fa-phone"></i>
            <div>
              <h6>{{ t.contact.phone_label }}</h6>
              <p>{{ site.phone }}</p>
            </div>
          </div>
          {% endif %}
        </div>
      </div>
      <div class="col-lg-8">
        <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" class="contact-form">
          <input type="hidden" name="form-name" value="contact">
          <p class="d-none">
            <label>Don't fill this out: <input name="bot-field"></label>
          </p>
          <div class="row">
            <div class="col-md-6 mb-3">
              <input type="text" name="name" class="form-control" placeholder="{{ t.contact.name_placeholder }}" required>
            </div>
            <div class="col-md-6 mb-3">
              <input type="email" name="email" class="form-control" placeholder="{{ t.contact.email_placeholder }}" required>
            </div>
          </div>
          <div class="mb-3">
            <input type="text" name="subject" class="form-control" placeholder="{{ t.contact.subject_placeholder }}" required>
          </div>
          <div class="mb-3">
            <textarea name="message" class="form-control" rows="5" placeholder="{{ t.contact.message_placeholder }}" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">{{ t.contact.submit }}</button>
        </form>
      </div>
    </div>
  </div>
</section>
