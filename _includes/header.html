<section id="home" class="hero-section" style="background-image: url('{{ site.hero_bg }}')">
  <div class="hero-overlay"></div>
  <div class="container h-100">
    <div class="row h-100 align-items-center justify-content-center text-center">
      <div class="col-lg-8">
        <h6 class="hero-subtitle">{{ t.tagline }}</h6>
        <h1 class="hero-title">
          {{ t.hero_intro }} <span class="animated-headline" data-headlines='{{ t.headlines | jsonify }}'>{{ t.headlines | first }}</span><span class="typewriter-cursor">|</span>
        </h1>
        <div class="hero-socials">
          {% for social in site.data.social %}
          <a href="{{ social.url }}" aria-label="{{ social.platform }}"{% if social.protected %} data-user="co" data-domain="hayvalley.de"{% endif %}><i class="{{ social.icon }}"></i></a>
          {% endfor %}
        </div>
        <a href="#about" class="hero-scroll-btn" aria-label="Scroll down">
          <i class="fas fa-chevron-down"></i>
        </a>
      </div>
    </div>
  </div>
</section>
