<section id="testimonials" class="section testimonials-section" style="background-image: url('{{ site.testimonials_bg }}')">
  <div class="testimonials-overlay"></div>
  <div class="container position-relative">
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center">
        <h6 class="section-subtitle">{{ t.testimonials.subtitle }}</h6>
        <h2 class="section-title">{{ t.testimonials.title }}</h2>
      </div>
    </div>
    <div class="row mt-5 justify-content-center">
      <div class="col-lg-8">
        <div class="carousel testimonials-carousel">
          <div class="carousel-track">
            {% for item in d.testimonials %}
            <div class="carousel-slide">
              <div class="testimonial-item text-center">
                <i class="fas fa-quote-left testimonial-quote-icon"></i>
                <p class="testimonial-text">{{ item.text }}</p>
                <h5 class="testimonial-name">{{ item.name }}</h5>
                <p class="testimonial-role">{{ item.role }}</p>
              </div>
            </div>
            {% endfor %}
          </div>
          <button class="carousel-arrow carousel-arrow-prev" aria-label="Previous"><i class="fas fa-chevron-left"></i></button>
          <button class="carousel-arrow carousel-arrow-next" aria-label="Next"><i class="fas fa-chevron-right"></i></button>
          <div class="carousel-dots"></div>
        </div>
      </div>
    </div>
  </div>
</section>
