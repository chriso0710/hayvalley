title: "Hi, I'm Christian. I ride bikes."
subtitle: "Gravel, Road & MTB Tours across Europe"
intro: "My collection of bikepacking tours, gravel events, and multi-day rides — from the Black Forest to the Atlas Mountains."
hero_image: "/assets/img/bikepacking/tnr2022_2.jpg"
about:
  - "I grew up on the flat roads of Northern Germany — running, road cycling, and dreaming of mountains. Over 20 years ago I traded Hamburg for a small village near Freiburg, and I've been exploring the Black Forest and beyond ever since."
  - "In 2018 I discovered gravel and bikepacking, and it changed everything. Now I spend my days building software and my weekends (and vacations) riding multi-day adventures and ultra events across Europe."
  - "I try to avoid flying to my tours — getting there by train or bike is part of the journey. Father of two, minimalist at heart, and a Chiru titanium bikes ambassador since 2025."
strava_url: "https://www.strava.com/athletes/4877153"
instagram_url: "https://www.instagram.com/chrisohayvalley/"
linkedin_url: "https://www.linkedin.com/in/hayvalley-christian-ott/"

