role: "Software Developer & Consultant"
paragraphs:
  - "Hey, I'm Christian, Software Developer, Consultant, Allround-Geek, REWORKer, Cyclist, Minimalist, Climate advocate, Food lover, Father of two girls. I love solving problems, building great software, and making the world a little better along the way."
  - "Diploma in Computer Science with over 30 years of project experience in the IT business. Freelance developer and consultant since 2010. Speaker, author, and experienced project manager who has led teams of up to 10 members, with product responsibility for healthcare software used nationwide in Germany."
  - "I work remote-first, pragmatic, and test-driven. As an open-source enthusiast, I actively contribute to the community. I have a strong commitment to software quality, from thorough testing and security best practices to attention to technical detail. Clean code, robust architecture, and reliable systems are not just goals, they are non-negotiables."
  - "When I'm not coding, I'm outdoors, cycling long distances, hiking, or climbing. I prefer trains over planes and care deeply about climate, renewable energy, and greener ways to get around. Sponsor at Plan International Germany and board member of Bürgerrunde Heuweiler e.V."
