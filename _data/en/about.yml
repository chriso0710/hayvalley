role: "Software Developer & Consultant"
paragraphs:
  - "Hey, I'm Christian, Software Developer, Consultant, Allround-Nerd, REWORKer, Cyclist, Minimalist, Climate advocate, Father of two girls. I love solving problems, building great software, and making the world a little better along the way."
  - "Diploma in Computer Science with over 30 years of project experience in the IT business. Freelance developer and consultant since 2010. Speaker, author, and experienced project manager with product responsibility for healthcare software used nationwide in Germany."
  - "I work AI-first, remote-first, pragmatic, and test-driven. Open-source enthusiast and active community contributor. AI can write code. I bring what it cannot: 30 years of experience and an eye for architecture that scales, is secure, and built to last."
  - "When I'm not coding, I'm outdoors, bicycle touring. I prefer trains over planes and care deeply about climate, renewable energy, and greener ways to get around. Sponsor at Plan International Germany and board member of Bürgerrunde Heuweiler e.V."
