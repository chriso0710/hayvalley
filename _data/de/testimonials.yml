- name: "Fabian Hager"
  role: "Digital Domain Lead, E.KUNDENSERVICE Netz GmbH, Landshut"
  text: "Christian hat verschiedene Projektrollen eingenommen und Aufgaben für das Produkt KARLA mit maximaler Kompetenz bearbeitet. In der technischen Konzeption agierte er als alleiniger Mastermind (Backend, Frontend, Datenbank, Deployment, Security, Testing, Automatisierung). Sowohl in Konzeption als auch Umsetzung profitierten wir enorm von seiner Fähigkeit, mühelos zwischen Entwickler-, Architekten-, Kunden- und Anwenderperspektive zu wechseln – immer auf den Punkt. Für PO und Projektmanagement war seine methodische und technische Expertise ein echter Gewinn!"

- name: "Jonas Fürste"
  role: "Geschäftsführer, Carl Group, Hamburg"
  text: "Die Zusammenarbeit mit Christian ist für uns seit mehreren Jahrzehnten von außergewöhnlicher Qualität geprägt. Sein hohes Maß an Vertrauenswürdigkeit, seine konsequente Sorgfalt und seine verlässliche Arbeitsweise machen ihn zu einem Partner, auf den wir uns jederzeit uneingeschränkt verlassen können. Danke Christian, wir freuen uns auf die gemeinsame, weitere Zusammenarbeit!"

- name: "André Wehrhahn"
  role: "Produktmanager, ESN EnergieSysteme Nord GmbH, Schwentinental"
  text: "Für einen unserer größeren Kunden suchten wir einen hocherfahrenen und technisch versierten Senior Developer mit starker Beratungskompetenz. Wir sind überaus zufrieden, eine sehr fruchtbare und entspannte, dabei aber hocheffiziente Zusammenarbeit mit Christian begonnen zu haben. Das agile Projekt lief im gesamten Team sehr geschmeidig und wurde durch Christians herausragende Kommunikationsfähigkeiten und seine langjährige technische Erfahrung maßgeblich gestärkt."

- name: "Peter Ellerau"
  role: "Geschäftsführer, HighCoordination GmbH, Radolfzell"
  text: "Christian hat unser veraltetes Projektmanagement- und Abrechnungssystem auf Basis modernster Webtechnologien neu implementiert. Neben der professionellen Entwicklung hinsichtlich Zeit, Budget und Qualität sticht seine kundenorientierte Beratung hervor, da er eine optimale und maßgeschneiderte Lösung für uns konzipiert hat. Zudem hat das Projekt richtig Spaß gemacht – vielen Dank dafür!"

- name: "Johannes Heimann"
  role: "Geschäftsführer, Carl Group, Hamburg"
  text: "Wir arbeiten seit Jahren sehr gut und vertrauensvoll zusammen. Christian ist in allen aktuellen Trends und Themen der Softwareentwicklung und DevOps bestens bewandert. Man kann hervorragend mit ihm über neue Ideen und deren Umsetzbarkeit diskutieren."

- name: "Michael Niemeier"
  role: "Marketing Manager, DNV GL SE, Essen"
  text: "Christian ist ein ruhiger, logisch denkender und angenehmer Gesprächspartner, der es versteht, Kundenbedürfnisse effizient und effektiv in technische/digitale Lösungen umzusetzen."

- name: "Christof Lippold"
  role: "Geschäftsführer, Lippold GmbH, Hamburg"
  text: "Christian ist motiviert, neugierig und begeisterungsfähig. Er arbeitet sich ständig in neue Technologien ein, um diese seinen Kunden anbieten zu können."

- name: "Rainer Thiemann"
  role: "Architekt, TBR Thiemann Brose Rittich, Hamburg"
  text: "Professionell und sachlich. Danke, super Arbeit, gut gemacht!"
