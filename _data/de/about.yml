role: "Software-Entwickler & Berater"
paragraphs:
  - "Hallo, ich bin Christian – Software-Entwickler, Berater, Allround-Nerd, REWORKer, Radfahrer, Minimalist, Klimaschützer, Genussmensch, Vater zweier Töchter. Ich liebe es, Probleme zu lösen, großartige Software zu bauen und die Welt dabei ein Stück besser zu machen."
  - "Diplom-Informatiker mit über 30 Jahren Projekterfahrung in der IT-Branche. Freiberuflicher Entwickler und Berater seit 2010. Speaker, Autor und erfahrener Projektmanager, der Teams mit bis zu 10 Mitarbeitern geleitet hat, mit Produktverantwortung für deutschlandweit eingesetzte Healthcare-Software."
  - "Ich arbeite remote-first, pragmatisch und testgetrieben. Als Open-Source-Enthusiast bin ich aktiver Contributor in der Community. Ich habe einen hohen Anspruch an Software-Qualität, von gründlichem Testing und Security Best Practices bis hin zur Liebe zum technischen Detail. Clean Code, robuste Architektur und zuverlässige Systeme sind für mich keine Ziele, sondern Selbstverständlichkeiten."
  - "Wenn ich nicht programmiere, bin ich draußen unterwegs: auf langen Radtouren, beim Wandern oder Klettern. Ich bevorzuge die Bahn gegenüber dem Flugzeug und setze mich für Klimaschutz, erneuerbare Energien und nachhaltige Mobilität ein. Pate bei Plan International Deutschland und Vorstandsmitglied der Bürgerrunde Heuweiler e.V."
