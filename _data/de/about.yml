role: "Software-Entwickler & Berater"
paragraphs:
  - "Hallo, ich bin Christian – Software-Entwickler, Berater, Allround-Nerd, REWORKer, Radfahrer, Minimalist, Klimaschützer, Vater zweier Töchter. Ich liebe es, Probleme zu lösen, großartige Software zu bauen und die Welt dabei ein Stück besser zu machen."
  - "Diplom-Informatiker mit über 30 Jahren Projekterfahrung in der IT-Branche. Freiberuflicher Entwickler und Berater seit 2010. Speaker, Autor und erfahrener Projektmanager mit Produktverantwortung für deutschlandweit eingesetzte Healthcare-Software."
  - "Ich arbeite AI-first, remote-first, pragmatisch und testgetrieben. Open-Source-Enthusiast und aktiver Community-Contributor. AI kann Code schreiben. Ich bringe mit, was sie nicht kann: 30 Jahre Erfahrung und ein Auge für Architektur, die skaliert, sicher ist und langfristig trägt."
  - 'Wenn ich nicht programmiere, bin ich draußen unterwegs: auf <a href="/bikepacking/">Radreisen</a>. Ich bevorzuge die Bahn gegenüber dem Flugzeug und setze mich für Klimaschutz, erneuerbare Energien und nachhaltige Mobilität ein. Pate bei Plan International Deutschland und Vorstandsmitglied der Bürgerrunde Heuweiler e.V.'
